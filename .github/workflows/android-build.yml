# GitHub Actions Workflow - Build Android APK (Debug)
# 
# Compilación de APK en modo debug sin requerimientos de firma.
# Genera automáticamente una APK sin firmar lista para testing.

name: Build Android APK

on:
  push:
    branches:
      - version-nativa

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js v20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          sdkmanager --install "ndk;26.1.10909125"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.1.10909125" >> $GITHUB_ENV
          echo "NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.1.10909125" >> $GITHUB_ENV

      - name: Install dependencies
        run: npm ci

      - name: Initialize Android project
        run: npx tauri android init

      - name: Build Android APK (Debug)
        run: npx tauri android build --debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-debug
          path: src-tauri/gen/android/app/build/outputs/apk/debug/*.apk
          retention-days: 30
          if-no-files-found: warn

      - name: List generated files
        if: always()
        run: |
          echo "=== Build artifacts ==="
          find src-tauri/gen/android/app/build/outputs/apk -name "*.apk" 2>/dev/null || echo "No APK files found"
